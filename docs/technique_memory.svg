<svg xmlns='http://www.w3.org/2000/svg' width='1400' height='950' viewBox='0 0 1400 950' font-family="'DM Sans', -apple-system, 'Helvetica Neue', Arial, sans-serif"><defs><marker id='ma' markerWidth='10' markerHeight='8' refX='8' refY='3.5' orient='auto'><path d='M0,0 L8,3.5 L0,7' fill='#E8A838'/></marker><marker id='mg' markerWidth='10' markerHeight='8' refX='8' refY='3.5' orient='auto'><path d='M0,0 L8,3.5 L0,7' fill='#b0aaa0'/></marker></defs><rect x='8' y='8' width='1384' height='934' rx='26' fill='#242220'/><rect x='32' y='36' width='390' height='584' rx='20' fill='#2e2b28' stroke='#4a463f' stroke-width='2'/><text x='56' y='74' font-size='24' font-weight='bold' fill='#c9c3b8'>CoALA memory stores</text><text x='56' y='100' font-size='16' fill='#8a847a'>arXiv 2309.02427 — plain files on device</text><rect x='60' y='124' width='334' height='128' rx='14' fill='#6D5BD8'/><text x='76' y='158' font-size='25' font-weight='bold' fill='#ffffff'>Semantic memory</text><text x='76' y='190' font-size='18' fill='#e6e0d6'>memories/user.md</text><text x='76' y='214' font-size='18' fill='#e6e0d6'>facts about the user</text><text x='76' y='238' font-size='18' fill='#e6e0d6'>injected as &lt;USER_MEMORY&gt;</text><rect x='60' y='286' width='334' height='128' rx='14' fill='#6D5BD8'/><text x='76' y='320' font-size='25' font-weight='bold' fill='#ffffff'>Episodic memory</text><text x='76' y='352' font-size='18' fill='#e6e0d6'>logs/tasks.jsonl</text><text x='76' y='376' font-size='18' fill='#e6e0d6'>task history + step traces</text><text x='76' y='400' font-size='18' fill='#e6e0d6'>read via recallHistory</text><rect x='60' y='448' width='334' height='128' rx='14' fill='#6D5BD8'/><text x='76' y='482' font-size='25' font-weight='bold' fill='#ffffff'>Procedural memory</text><text x='76' y='514' font-size='18' fill='#e6e0d6'>procedures/procedures.jsonl</text><text x='76' y='538' font-size='18' fill='#e6e0d6'>learned task workflows</text><text x='76' y='562' font-size='18' fill='#e6e0d6'>trust = successes / uses</text><rect x='454' y='36' width='430' height='584' rx='20' fill='#2e2b28' stroke='#4a463f' stroke-width='2'/><text x='478' y='74' font-size='24' font-weight='bold' fill='#c9c3b8'>XML system prompt (cached)</text><text x='478' y='100' font-size='16' fill='#8a847a'>one hot prefix — reused every step</text><rect x='478' y='120' width='382' height='360' rx='14' fill='#242220' stroke='#4a463f' stroke-width='2'/><text x='498' y='154' font-size='20' font-weight='bold' fill='#E8A838'>&lt;SYSTEM_CAPABILITY&gt;</text><text x='498' y='176' font-size='15' fill='#8a847a'>device, %-coords, batching rules</text><text x='498' y='210' font-size='20' font-weight='bold' fill='#E8A838'>&lt;USER_MEMORY&gt;</text><text x='498' y='232' font-size='15' fill='#8a847a'>← semantic memory file</text><text x='498' y='266' font-size='20' font-weight='bold' fill='#E8A838'>&lt;AVAILABLE_APPS&gt;</text><text x='498' y='288' font-size='15' fill='#8a847a'>detected app list</text><text x='498' y='322' font-size='20' font-weight='bold' fill='#E8A838'>&lt;STRATEGY&gt; + &lt;IMPORTANT&gt;</text><text x='498' y='344' font-size='15' fill='#8a847a'>bundled-coords tapping, iOS gotchas</text><text x='498' y='378' font-size='20' font-weight='bold' fill='#E8A838'>&lt;RULES&gt;</text><text x='498' y='400' font-size='15' fill='#8a847a'>askUser policy, webSearch, memory</text><text x='498' y='434' font-size='20' font-weight='bold' fill='#E8A838'>&lt;LEARNED_PROCEDURE&gt;</text><text x='498' y='456' font-size='15' fill='#8a847a'>← matched procedure — hint, not script</text><rect x='478' y='500' width='382' height='88' rx='14' fill='#6D5BD8'/><text x='498' y='530' font-size='18' font-weight='bold' fill='#ffffff'>Prompt cache (Anthropic path)</text><text x='498' y='554' font-size='15' fill='#e6e0d6'>system + tools marked cache_control</text><text x='498' y='576' font-size='15' fill='#e6e0d6'>type: ephemeral — 5-min sliding TTL</text><rect x='916' y='36' width='452' height='584' rx='20' fill='#2e2b28' stroke='#4a463f' stroke-width='2'/><text x='940' y='74' font-size='24' font-weight='bold' fill='#c9c3b8'>Context window at step N</text><text x='940' y='100' font-size='16' fill='#8a847a'>single-image mode — what the model sees</text><rect x='944' y='116' width='396' height='104' rx='14' fill='#6D5BD8'/><text x='960' y='150' font-size='25' font-weight='bold' fill='#ffffff'>Cached prefix</text><text x='960' y='180' font-size='18' fill='#e6e0d6'>system prompt + tool definitions</text><text x='960' y='204' font-size='18' fill='#e6e0d6'>cache read on every step</text><rect x='944' y='238' width='396' height='104' rx='14' fill='#B8842C'/><text x='960' y='272' font-size='25' font-weight='bold' fill='#ffffff'>Task message</text><text x='960' y='302' font-size='18' fill='#e6e0d6'>task text + first screenshot</text><text x='960' y='326' font-size='18' fill='#e6e0d6'>initial UI element labels</text><rect x='944' y='360' width='396' height='118' rx='14' fill='#0E9F7A'/><text x='960' y='394' font-size='25' font-weight='bold' fill='#ffffff'>[Context] injection</text><text x='960' y='422' font-size='18' fill='#e6e0d6'>rebuilt and re-spliced each step</text><text x='960' y='444' font-size='18' fill='#e6e0d6'>action history: rolling summary</text><text x='960' y='466' font-size='18' fill='#e6e0d6'>current screen elements + coords</text><rect x='944' y='496' width='396' height='104' rx='14' fill='#B8842C'/><text x='960' y='530' font-size='25' font-weight='bold' fill='#ffffff'>Latest screenshot only</text><text x='960' y='560' font-size='18' fill='#e6e0d6'>prior images become text stubs</text><text x='960' y='584' font-size='18' fill='#e6e0d6'>768px JPEG q85 · ~150 KB</text><line x1='1142' y1='222' x2='1142' y2='236' stroke='#b0aaa0' stroke-width='2'/><line x1='1142' y1='344' x2='1142' y2='358' stroke='#b0aaa0' stroke-width='2'/><line x1='1142' y1='480' x2='1142' y2='494' stroke='#b0aaa0' stroke-width='2'/><path d='M394,188 C438,188 440,214 472,214' fill='none' stroke='#b0aaa0' stroke-width='2.5' marker-end='url(#mg)'/><path d='M394,512 C440,512 440,440 472,440' fill='none' stroke='#b0aaa0' stroke-width='2.5' marker-end='url(#mg)'/><path d='M860,300 C906,300 900,168 938,168' fill='none' stroke='#E8A838' stroke-width='3' marker-end='url(#ma)'/><rect x='32' y='640' width='1336' height='270' rx='20' fill='#2e2b28' stroke='#4a463f' stroke-width='2'/><text x='56' y='678' font-size='24' font-weight='bold' fill='#c9c3b8'>Rolling summary loop (every step)</text><rect x='64' y='712' width='290' height='110' rx='14' fill='#0E9F7A'/><text x='80' y='746' font-size='25' font-weight='bold' fill='#ffffff'>Run tools</text><text x='80' y='776' font-size='18' fill='#e6e0d6'>tap / typeAndSubmit / …</text><text x='80' y='798' font-size='18' fill='#e6e0d6'>stuck-check keys logged</text><rect x='394' y='712' width='290' height='110' rx='14' fill='#0E9F7A'/><text x='410' y='746' font-size='25' font-weight='bold' fill='#ffffff'>Append summary</text><text x='410' y='776' font-size='18' fill='#e6e0d6'>“Step 3: tap(90, 56)”</text><text x='410' y='798' font-size='18' fill='#e6e0d6'>one line per step</text><rect x='724' y='712' width='290' height='110' rx='14' fill='#0E9F7A'/><text x='740' y='746' font-size='25' font-weight='bold' fill='#ffffff'>Strip old images</text><text x='740' y='776' font-size='18' fill='#e6e0d6'>old image → text stub</text><text x='740' y='798' font-size='18' fill='#e6e0d6'>“[Previous screenshot …]”</text><rect x='1054' y='712' width='290' height='110' rx='14' fill='#0E9F7A'/><text x='1070' y='746' font-size='25' font-weight='bold' fill='#ffffff'>Capture new state</text><text x='1070' y='776' font-size='18' fill='#e6e0d6'>screenshot + hierarchy</text><text x='1070' y='798' font-size='18' fill='#e6e0d6'>parallel Promise.all</text><path d='M356,767 L388,767' stroke='#E8A838' stroke-width='3' marker-end='url(#ma)'/><path d='M686,767 L718,767' stroke='#E8A838' stroke-width='3' marker-end='url(#ma)'/><path d='M1016,767 L1048,767' stroke='#E8A838' stroke-width='3' marker-end='url(#ma)'/><text x='700' y='858' font-size='18' fill='#e6e0d6' text-anchor='middle'>One image + N summary lines enter the context — instead of N stacked screenshots</text><line x1='400' y1='886' x2='440' y2='886' stroke='#E8A838' stroke-width='3'/><text x='450' y='892' font-size='15' fill='#cfc9bf'>per-step context flow</text><line x1='680' y1='886' x2='720' y2='886' stroke='#b0aaa0' stroke-width='2.5'/><text x='730' y='892' font-size='15' fill='#cfc9bf'>prompt assembly (per run)</text></svg>